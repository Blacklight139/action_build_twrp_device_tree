name: TWRP设备树自动化构建 新runner版

on:
  workflow_dispatch:
    inputs:
      LIBRARY_NAME:
        description: '库名称 (仅用于显示)'
        required: true
        default: 'Twrp_Device_Generator'
      DEVICE_CODENAME:
        description: '设备代号 (如 beyond0lte、sakura)'
        required: true
        default: 'aosp_arm64'
      MANUFACTURER:
        description: '制造商 (如 samsung、xiaomi)'
        required: false
        default: 'generic'
      IMG_URL:
        description: 'recovery/boot 镜像直链地址'
        required: true
        default: 'https://github.com/Blacklight139/action_build_twrp_device_tree/raw/main/recovery.img'
      SYSTEM_BUILD_PROP_URL:
        description: 'system/build.prop 直链地址 (可选，OPPO 设备需提供)'
        required: false
        default: 'https://github.com/Blacklight139/action_build_twrp_device_tree/raw/main/prop/system/build.prop'
      VENDOR_BUILD_PROP_URL:
        description: 'vendor/build.prop 直链地址 (可选，OPPO 设备需提供)'
        required: false
        default: 'https://github.com/Blacklight139/action_build_twrp_device_tree/raw/main/prop/vendor/build.prop'

jobs:
  generate-device-tree:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 \
          python3-pip \
          cpio \
          wget \
          zip \
          unzip

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install TWRP generator
      run: |
        pip3 install --upgrade twrpdtgen
        
    - name: Download recovery image
      run: |
        wget -O recovery.img "${{ github.event.inputs.IMG_URL }}"
        file recovery.img || true  # 输出文件类型用于调试
      
    - name: Generate device tree
      run: |
        mkdir -p device_tree_output
        python3 -m twrpdtgen \
          -o device_tree_output \
          recovery.img

    - name: Merge OPPO build.prop into prop.default
      if: github.event.inputs.MANUFACTURER == 'oppo' && github.event.inputs.SYSTEM_BUILD_PROP_URL != '' && github.event.inputs.VENDOR_BUILD_PROP_URL != ''
      run: |
        node -e "
        const https = require('https');
        const fs = require('fs');
        const urls = [
          '${{ github.event.inputs.SYSTEM_BUILD_PROP_URL }}',
          '${{ github.event.inputs.VENDOR_BUILD_PROP_URL }}'
        ];
        async function download(url) {
          return new Promise((resolve, reject) => {
            https.get(url, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => resolve(data));
            }).on('error', reject);
          });
        }
        (async () => {
          try {
            const systemProp = await download(urls[0]);
            const vendorProp = await download(urls[1]);
            const merged = systemProp + '\n' + vendorProp;
            fs.writeFileSync('device_tree_output/prop.default', merged);
            console.log('prop.default merged successfully.');
          } catch (e) {
            console.error('Failed to download or merge build.prop:', e);
            process.exit(1);
          }
        })();
        " 

    - name: Compress device tree (with prop.default if OPPO)
      run: |
        cd device_tree_output
        zip -r ../DeviceTree_${{ github.run_number }}.zip .
        cd ..
        
    - name: Create release with device tree
      uses: softprops/action-gh-release@v1
      with:
        files: DeviceTree_${{ github.run_number }}.zip
        name: TWRP_Device_Tree_${{ github.run_number }}
        tag_name: dt-${{ github.run_number }}
        body: |
          Automatically generated TWRP device tree
          Build run: ${{ github.run_number }}
          Source image: ${{ github.event.inputs.IMG_URL }}
          ${{ github.event.inputs.MANUFACTURER == 'oppo' && 'System & vendor build.prop merged into prop.default' || '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
