name: TWRP设备树自动化构建 新selfhost版

on:
  workflow_dispatch:
    inputs:
      LIBRARY_NAME:
        description: '库名称 (仅用于显示)'
        required: true
        default: 'Twrp_Device_Generator'
      DEVICE_CODENAME:
        description: '设备代号 (如 beyond0lte、sakura)'
        required: true
        default: 'aosp_arm64'
      MANUFACTURER:
        description: '制造商 (如 samsung、xiaomi)'
        required: false
        default: 'generic'
      IMG_URL:
        description: 'recovery/boot 镜像直链地址'
        required: true
        default: 'https://github.com/momo54181/action_build_twrp_device_tree/raw/main/recovery.img'
      PROP_DEFAULT_URL:
        description: 'prop.default 文件直链 (可选，OPPO 设备可直接提供此链接，无需填写下方两个 build.prop 链接)'
        required: false
        default: ''
      SYSTEM_BUILD_PROP_URL:
        description: 'system/build.prop 直链地址 (可选，若已提供 prop.default 直链可忽略)'
        required: false
        default: ''
      VENDOR_BUILD_PROP_URL:
        description: 'vendor/build.prop 直链地址 (可选，若已提供 prop.default 直链可忽略)'
        required: false
        default: ''

jobs:
  generate-device-tree:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: self-hosted
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3 \
          python3-pip \
          cpio \
          wget \
          zip \
          unzip

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install TWRP generator
      run: |
        pip3 install --upgrade twrpdtgen
        
    - name: Download recovery image
      run: |
        wget -O recovery.img "${{ github.event.inputs.IMG_URL }}"
        file recovery.img || true  # 输出文件类型用于调试
      
    - name: Generate device tree
      run: |
        mkdir -p device_tree_output
        python3 -m twrpdtgen \
          -o device_tree_output \
          recovery.img

    - name: Setup prop.default for OPPO
      if: github.event.inputs.MANUFACTURER == 'oppo'
      env:
        PROP_DEFAULT_URL: ${{ github.event.inputs.PROP_DEFAULT_URL }}
        SYSTEM_BUILD_PROP_URL: ${{ github.event.inputs.SYSTEM_BUILD_PROP_URL }}
        VENDOR_BUILD_PROP_URL: ${{ github.event.inputs.VENDOR_BUILD_PROP_URL }}
      run: |
        cat << 'SCRIPT' > setup_prop.js
        const https = require('https');
        const http = require('http');
        const fs = require('fs');

        function download(url) {
          return new Promise((resolve, reject) => {
            const client = url.startsWith('https') ? https : http;
            client.get(url, (res) => {
              // 处理重定向
              if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                return resolve(download(res.headers.location));
              }
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => resolve(data));
            }).on('error', reject);
          });
        }

        async function main() {
          const propDefaultUrl = process.env.PROP_DEFAULT_URL;
          const systemUrl = process.env.SYSTEM_BUILD_PROP_URL;
          const vendorUrl = process.env.VENDOR_BUILD_PROP_URL;

          if (propDefaultUrl) {
            console.log('下载 prop.default 直链...');
            const content = await download(propDefaultUrl);
            fs.writeFileSync('device_tree_output/prop.default', content);
            console.log('prop.default 已从直链保存。');
          } else if (systemUrl && vendorUrl) {
            console.log('下载 system 与 vendor build.prop 并合并...');
            const systemProp = await download(systemUrl);
            const vendorProp = await download(vendorUrl);
            const merged = systemProp + '\n' + vendorProp;
            fs.writeFileSync('device_tree_output/prop.default', merged);
            console.log('prop.default 已合并并保存。');
          } else {
            console.log('未提供 prop.default 直链或两个 build.prop 直链，跳过 prop.default 生成。');
          }
        }

        main().catch(err => {
          console.error(err);
          process.exit(1);
        });
        SCRIPT
        node setup_prop.js

    - name: Compress device tree
      run: |
        cd device_tree_output
        zip -r ../DeviceTree_${{ github.run_number }}.zip .
        cd ..
        
    - name: Create release with device tree
      uses: softprops/action-gh-release@v1
      with:
        files: DeviceTree_${{ github.run_number }}.zip
        name: TWRP_Device_Tree_${{ github.run_number }}
        tag_name: dt-${{ github.run_number }}
        body: |
          Automatically generated TWRP device tree
          Build run: ${{ github.run_number }}
          Source image: ${{ github.event.inputs.IMG_URL }}
          ${{ github.event.inputs.MANUFACTURER == 'oppo' && github.event.inputs.PROP_DEFAULT_URL && 'prop.default 由直链下载' || '' }}
          ${{ github.event.inputs.MANUFACTURER == 'oppo' && !github.event.inputs.PROP_DEFAULT_URL && github.event.inputs.SYSTEM_BUILD_PROP_URL && github.event.inputs.VENDOR_BUILD_PROP_URL && 'prop.default 由 system + vendor build.prop 合并生成' || '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
